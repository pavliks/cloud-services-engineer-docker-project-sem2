services:
  backend-lb:
    image: nginxinc/nginx-unprivileged:1.31.2-alpine3.23
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:8080"
    volumes:
      - ./deploy/nginx/backend-lb.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_lb_cache:/var/cache/nginx
    networks:
      - backend
      - frontend
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.25
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 4s
      retries: 4
      start_period: 15s
  
  backend:
    image: momo-store-backend:local
    build:
      context: ./backend
    restart: unless-stopped
    expose:
      - "8081"
    secrets:
      - app_secret
    networks:
      - backend
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.50
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 4s
      retries: 4
      start_period: 15s
      
  frontend:
    image: momo-store-frontend:local
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend-lb:
        condition: service_healthy
    ports:
      - "80:8080"
    volumes:
      - frontend_cache:/var/cache/nginx
    networks:
      - frontend
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.50
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 4s
      retries: 4
      start_period: 15s

  frontend-dev:
    profiles:
      - dev
    image: momo-store-frontend-dev:local
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    depends_on:
      backend-lb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      VUE_APP_API_URL: http://localhost:8081
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/babel.config.js:/app/babel.config.js:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/vue.config.js:/app/vue.config.js:ro
    networks:
      - frontend
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.00
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 4s
      retries: 4
      start_period: 30s

volumes:
  frontend_cache:
  backend_lb_cache:

networks:
  frontend:
    driver: bridge
    internal: false
  backend:
    driver: bridge
    internal: true

secrets:
  app_secret:
    file: ./secrets/app_secret.txt
    
