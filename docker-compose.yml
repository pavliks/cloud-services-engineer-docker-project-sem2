services:
  backend:
    image: momo-store-backend:local
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - app
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.50
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8081/health"]
      interval: 30s
      timeout: 4s
      retries: 4
      start_period: 15s
      
  frontend:
    image: momo-store-frontend:local
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:8080"
    networks:
      - app
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
    pids_limit: 64
    mem_limit: 128m
    cpus: 0.50
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 4s
      retries: 4
      start_period: 15s

networks:
  app:
    driver: bridge
    
